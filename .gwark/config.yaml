# gwark configuration
version: "1.0"

# Default settings for all commands
defaults:
  days_back: 30
  max_results: 500
  output_format: markdown
  output_directory: ./reports
  detail_level: summary

# OAuth2 authentication settings
auth:
  credentials_path: .gwark/credentials/oauth2_credentials.json
  tokens_path: .gwark/tokens
  default_account: primary

# AI summarization settings (Claude Haiku)
ai:
  provider: anthropic
  model: claude-3-haiku-20240307
  batch_size: 10
  max_body_chars: 2500

# Rate limiting (Google Workspace limits)
# Project: 1,200,000 queries/min | Per-user: 15,000 queries/min
# Note: max_concurrent can be increased to 50 for stable network connections
gmail:
  rate_limit_per_second: 250
  rate_limit_burst: 100
  max_concurrent: 10

# Calendar settings
calendar:
  calendars:
    - primary
    - mknv74@gmail.com
    - mack@roamhq.io

# Active profile (profiles stored in .gwark/profiles/)
active_profile: default
