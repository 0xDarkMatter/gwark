# Gmail MCP Server Configuration
# Copy to server_config.yaml and customize

server:
  name: "Gmail MCP Server"
  version: "0.1.0"
  host: "localhost"
  port: 8080

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/gmail_mcp.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

oauth2:
  credentials_path: "config/oauth2_credentials.json"
  scopes:
    - "https://www.googleapis.com/auth/gmail.readonly"
    - "https://www.googleapis.com/auth/gmail.modify"
    - "https://www.googleapis.com/auth/gmail.labels"
  token_storage:
    path: "data/tokens"
    encryption: true

cache:
  enabled: true
  backend: "sqlite"
  database_path: "data/cache/email_cache.db"
  ttl_seconds: 3600
  max_size_mb: 500
  cleanup_interval_seconds: 1800

gmail_api:
  default_page_size: 100
  max_batch_size: 50
  max_results_per_search: 500
  timeout_seconds: 30
  retry_attempts: 3
  retry_backoff_factor: 2

rate_limiting:
  enabled: true
  requests_per_second: 10
  burst_size: 20

pagination:
  enabled: true
  default_page_size: 100
  max_page_size: 500
  persist_state: true

performance:
  async_enabled: true
  connection_pool_size: 10
  max_concurrent_requests: 5

accounts:
  max_accounts: 5
  default_account: "primary"
